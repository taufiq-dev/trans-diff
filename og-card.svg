<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Trans Diff Open Graph card</title>
  <desc id="desc">A social preview card for Trans Diff showing JSON translation comparison columns.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#f7f7f5"/>
      <stop offset="100%" stop-color="#ececea"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f2ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111111" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#d6d6d2" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.42"/>
  <path d="M0 518 C205 486 331 556 520 516 C734 471 844 382 1200 416 L1200 630 L0 630 Z" fill="#111111" opacity="0.035"/>

  <g transform="translate(78 74)">
    <g>
      <rect x="0" y="0" width="72" height="72" rx="18" fill="#111111"/>
      <rect x="17" y="18" width="19" height="36" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
      <rect x="38" y="18" width="19" height="36" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
      <path d="M34 36h6" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="92" y="30" fill="#111111" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="750">Trans Diff</text>
    <text x="92" y="60" fill="#6b6b65" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500">JSON translation workspace</text>

    <text x="0" y="168" fill="#111111" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="780">Compare and edit</text>
    <text x="0" y="230" fill="#111111" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="780">JSON translations.</text>
    <text x="0" y="284" fill="#565650" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="450">Keep nested keys, arrays, and typed</text>
    <text x="0" y="317" fill="#565650" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23" font-weight="450">values aligned across every locale file.</text>

    <g transform="translate(0 382)">
      <rect x="0" y="0" width="146" height="42" rx="21" fill="#111111"/>
      <text x="22" y="27" fill="#ffffff" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">Typed tree</text>
      <rect x="158" y="0" width="171" height="42" rx="21" fill="#ffffff" stroke="#d8d8d3"/>
      <circle cx="182" cy="21" r="6" fill="#22c55e"/>
      <text x="198" y="27" fill="#222222" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="650">Auto-translate</text>
      <rect x="342" y="0" width="145" height="42" rx="21" fill="#ffffff" stroke="#d8d8d3"/>
      <circle cx="366" cy="21" r="6" fill="#f59e0b"/>
      <text x="382" y="27" fill="#222222" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="650">Path status</text>
    </g>
  </g>

  <g transform="translate(610 82)" filter="url(#shadow)">
    <rect x="0" y="0" width="512" height="466" rx="28" fill="url(#screen)" stroke="#d7d7d2"/>
    <rect x="24" y="22" width="464" height="52" rx="16" fill="#111111"/>
    <circle cx="51" cy="48" r="6" fill="#ef4444"/>
    <circle cx="72" cy="48" r="6" fill="#f59e0b"/>
    <circle cx="93" cy="48" r="6" fill="#22c55e"/>
    <text x="122" y="54" fill="#ffffff" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">locale files</text>

    <g transform="translate(24 96)">
      <rect x="0" y="0" width="464" height="46" rx="14" fill="#ffffff" stroke="#deded9"/>
      <text x="22" y="29" fill="#6b6b65" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Key</text>
      <text x="210" y="29" fill="#6b6b65" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">en.json</text>
      <text x="300" y="29" fill="#6b6b65" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">id.json</text>
      <text x="406" y="29" text-anchor="middle" fill="#6b6b65" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Status</text>

      <g transform="translate(0 62)">
        <rect x="0" y="0" width="464" height="54" rx="14" fill="#ffffff" stroke="#e7e7e2"/>
        <path d="M24 19v17M24 19h18" stroke="#b7b7ae" stroke-width="2" stroke-linecap="round"/>
        <text x="52" y="33" fill="#1f1f1c" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">home.title</text>
        <text x="210" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">Welcome</text>
        <text x="300" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">Selamat</text>
        <rect x="372" y="13" width="68" height="28" rx="14" fill="#dcfce7"/>
        <text x="406" y="27" text-anchor="middle" dominant-baseline="middle" fill="#166534" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800">Synced</text>
      </g>

      <g transform="translate(0 126)">
        <rect x="0" y="0" width="464" height="54" rx="14" fill="#ffffff" stroke="#e7e7e2"/>
        <path d="M24 17v20M24 37h18" stroke="#b7b7ae" stroke-width="2" stroke-linecap="round"/>
        <text x="52" y="33" fill="#1f1f1c" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">menu.items[]</text>
        <text x="210" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">array</text>
        <text x="300" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">array</text>
        <rect x="372" y="13" width="68" height="28" rx="14" fill="#dbeafe"/>
        <text x="406" y="27" text-anchor="middle" dominant-baseline="middle" fill="#1d4ed8" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800">Array</text>
      </g>

      <g transform="translate(0 190)">
        <rect x="0" y="0" width="464" height="54" rx="14" fill="#ffffff" stroke="#e7e7e2"/>
        <path d="M24 17v20M24 37h18" stroke="#b7b7ae" stroke-width="2" stroke-linecap="round"/>
        <text x="52" y="33" fill="#1f1f1c" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">price.amount</text>
        <text x="210" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">19</text>
        <text x="300" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">19</text>
        <rect x="372" y="13" width="68" height="28" rx="14" fill="#fef3c7"/>
        <text x="406" y="27" text-anchor="middle" dominant-baseline="middle" fill="#92400e" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800">Number</text>
      </g>

      <g transform="translate(0 254)">
        <rect x="0" y="0" width="464" height="54" rx="14" fill="#ffffff" stroke="#e7e7e2"/>
        <path d="M24 17v20M24 37h18" stroke="#b7b7ae" stroke-width="2" stroke-linecap="round"/>
        <text x="52" y="33" fill="#1f1f1c" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">cta.label</text>
        <text x="210" y="33" fill="#44443f" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">Start</text>
        <rect x="300" y="21" width="46" height="8" rx="4" fill="#d7d7d2"/>
        <rect x="372" y="13" width="68" height="28" rx="14" fill="#fee2e2"/>
        <text x="406" y="27" text-anchor="middle" dominant-baseline="middle" fill="#991b1b" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="800">Missing</text>
      </g>
    </g>
  </g>
</svg>
